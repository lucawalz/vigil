# git-cliff configuration — https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}]\
        {% if previous and previous.version -%}
            (https://github.com/lucawalz/vigil/compare/{{ previous.version }}...{{ version }})\
        {% else -%}
            (https://github.com/lucawalz/vigil/releases/tag/{{ version }})\
        {% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first | trim }} \
            ([{{ commit.id | truncate(length=7, end="") }}]\
            (https://github.com/lucawalz/vigil/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

commit_parsers = [
    { message = "^Merge", skip = true },
    { message = "(?i)dependabot", group = "<!-- 8 -->Dependencies" },
    { message = "(?i)\\bbump\\b", group = "<!-- 8 -->Dependencies" },
    { message = "^chore\\(deps\\)", group = "<!-- 8 -->Dependencies" },
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Refactoring" },
    { message = "^docs", group = "<!-- 4 -->Documentation" },
    { message = "^test", group = "<!-- 5 -->Testing" },
    { message = "^build", group = "<!-- 6 -->Build" },
    { message = "^ci", group = "<!-- 7 -->CI" },
    { message = "^chore", group = "<!-- 9 -->Miscellaneous" },
    { message = ".*", group = "<!-- 9 -->Miscellaneous" },
]
