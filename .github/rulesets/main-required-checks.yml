# This file documents the repository ruleset applied to main via the GitHub API.
# To apply: gh api repos/lucawalz/vigil/rulesets --method POST --input this-file
# (after converting to JSON — this YAML is documentation only)
name: main-required-checks
target: branch
enforcement: active
conditions:
  ref_name:
    include:
      - refs/heads/main
    exclude: []
rules:
  - type: pull_request
    parameters:
      required_approving_review_count: 0
      dismiss_stale_reviews_on_push: true
      require_code_owner_review: false
      require_last_push_approval: false
      required_review_thread_resolution: false
  - type: required_status_checks
    parameters:
      strict_required_status_checks_policy: true
      required_status_checks:
        - context: python-lint
        - context: python-test
        - context: detect-go-modules
        - context: "go-lint (./mcp-servers/flux-mcp)"
        - context: "go-lint (./mcp-servers/kubectl-mcp)"
        - context: "go-lint (./mcp-servers/nixos-mcp)"
        - context: "go-lint (./mcp-servers/ssh-mcp)"
        - context: "go-test (./mcp-servers/flux-mcp)"
        - context: "go-test (./mcp-servers/kubectl-mcp)"
        - context: "go-test (./mcp-servers/nixos-mcp)"
        - context: "go-test (./mcp-servers/ssh-mcp)"
        - context: "govulncheck (./mcp-servers/flux-mcp)"
        - context: "govulncheck (./mcp-servers/kubectl-mcp)"
        - context: "govulncheck (./mcp-servers/nixos-mcp)"
        - context: "govulncheck (./mcp-servers/ssh-mcp)"
        - context: go-build
        - context: terraform-lint
