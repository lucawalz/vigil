name: Eval Campaign

on:
  workflow_dispatch:
    inputs:
      seed:
        description: "Seed integer for scenario runs"
        required: false
        default: "1"
      concurrency:
        description: "Max parallel matrix jobs"
        type: number
        required: false
        default: 2
      model:
        description: "LLM model identifier"
        type: choice
        required: false
        default: "claude-sonnet-4-6"
        options:
          - claude-sonnet-4-6
          - qwen3.5:cloud
          - deepseek-v3.2:cloud
      skip_k8s:
        description: "Skip the k8s scenario group"
        type: boolean
        required: false
        default: false
      skip_os:
        description: "Skip the os scenario group"
        type: boolean
        required: false
        default: false
      skip_destroy:
        description: "Skip terraform destroy"
        type: boolean
        required: false
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - id: build
        run: |
          groups='[]'
          if [ '${{ inputs.skip_k8s }}' != 'true' ]; then
            groups=$(echo "$groups" | jq -c '. + [{"group":"k8s","scenarios":"k8s-1g k8s-2g k8s-3g k8s-4g k8s-5g live-quota-injected deceptive-2 k8s-rollback-1"}]')
          fi
          if [ '${{ inputs.skip_os }}' != 'true' ]; then
            groups=$(echo "$groups" | jq -c '. + [{"group":"os","scenarios":"os-1 os-1g os-drift-sysctl os-stale-generation disk-pressure"}]')
          fi
          echo "matrix=$(echo "$groups" | jq -c '{include:.}')" >> "$GITHUB_OUTPUT"

  run-scenarios:
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.concurrency || '4') }}
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      TF_VAR_hcloud_token: ${{ secrets.TF_VAR_HCLOUD_TOKEN }}
      TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
      TF_VAR_vigil_webhook_secret: ${{ secrets.TF_VAR_VIGIL_WEBHOOK_SECRET }}
      TF_VAR_llm_model_name: ${{ secrets.TF_VAR_LLM_MODEL_NAME }}
      TF_VAR_group_name: ${{ matrix.group }}
      TF_VAR_run_id: ${{ github.run_id }}-${{ matrix.group }}
      TF_VAR_operator_ssh_pubkey: ${{ secrets.OPERATOR_SSH_PUBKEY }}
      TF_VAR_vigil_branch: chore/eval-cluster-baseline
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Generate ephemeral SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""

      - name: Prepare kube directory
        run: mkdir -p ~/.kube

      - name: Detect provider
        env:
          MODEL: ${{ inputs.model }}
        run: |
          if [[ "$MODEL" == claude-* ]]; then
            echo "TF_VAR_anthropic_api_key=${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}" >> "$GITHUB_ENV"
          else
            echo "TF_VAR_ollama_api_key=${{ secrets.TF_VAR_OLLAMA_API_KEY }}" >> "$GITHUB_ENV"
            echo "TF_VAR_ollama_base_url=${{ secrets.TF_VAR_OLLAMA_BASE_URL }}" >> "$GITHUB_ENV"
          fi

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve -input=false

      - name: Wait for kubeconfig
        run: |
          KUBECONFIG=~/.kube/hetzner-vigil-${{ matrix.group }}
          DEADLINE=$(($(date +%s) + 300))
          until [ -s "$KUBECONFIG" ]; do
            if [ $(date +%s) -gt $DEADLINE ]; then
              echo "kubeconfig not written after 5 minutes — terraform apply may have failed"
              ls -la ~/.kube/ || true
              exit 1
            fi
            echo "$(date -u +%H:%M:%SZ) waiting for $KUBECONFIG ..."
            sleep 5
          done
          echo "kubeconfig ready ($(wc -c < "$KUBECONFIG") bytes)"

      - name: Inject SOPS age key into Flux
        run: |
          set -o pipefail
          echo "${{ secrets.SOPS_AGE_KEY }}" > /tmp/sops-age.txt
          chmod 600 /tmp/sops-age.txt
          kubectl --kubeconfig ~/.kube/hetzner-vigil-${{ matrix.group }} \
            create secret generic sops-age \
            --namespace=flux-system \
            --from-file=age.agekey=/tmp/sops-age.txt \
            --dry-run=client -o yaml \
            | kubectl --kubeconfig ~/.kube/hetzner-vigil-${{ matrix.group }} apply -f -
          rm -f /tmp/sops-age.txt
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          for ks in flux-system cluster-namespaces cluster-sources cluster-secrets cluster-infrastructure cluster-apps; do
            kubectl --kubeconfig ~/.kube/hetzner-vigil-${{ matrix.group }} \
              annotate kustomization "$ks" -n flux-system \
              "reconcile.fluxcd.io/requestedAt=$NOW" --overwrite || true
          done

      - name: Wait for Flux kustomizations ready
        run: eval/scripts/wait-flux-ready.sh "$HOME/.kube/hetzner-vigil-${{ matrix.group }}"

      - name: Resolve agent host IP
        id: agent
        working-directory: infra/terraform
        run: echo "ip=$(terraform output -raw agent_public_ip)" >> $GITHUB_OUTPUT

      - name: Wait for orchestrator to be reachable
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          DEADLINE=$(($(date +%s) + 600))
          ITER=0
          until ssh $SSH_OPTS root@${{ steps.agent.outputs.ip }} \
              "curl -sf http://localhost:9099/healthz > /dev/null 2>&1"; do
            if [ $(date +%s) -gt $DEADLINE ]; then
              echo "Orchestrator not ready after 10 minutes — diagnostics:"
              ssh $SSH_OPTS root@${{ steps.agent.outputs.ip }} "
                systemctl status vigil-setup.service vigil-orchestrator.service --no-pager -l 2>&1 || true
                echo '--- journal: vigil-setup ---'
                journalctl -u vigil-setup.service --no-pager -n 200 2>&1 || true
                echo '--- journal: vigil-orchestrator ---'
                journalctl -u vigil-orchestrator.service --no-pager -n 200 2>&1 || true
                echo '--- port 9099 ---'
                ss -ltnp | grep 9099 || echo 'not listening'
                echo '--- /etc/vigil ---'
                ls -la /etc/vigil/ 2>&1 || true
                test -f /etc/vigil/env && sed 's/=.*\$/=REDACTED/' /etc/vigil/env || echo '/etc/vigil/env MISSING'
                echo '--- /root/vigil ---'
                ls -la /root/vigil/ 2>&1 || true
              " || true
              exit 1
            fi
            ITER=$((ITER + 1))
            if [ $((ITER % 6)) -eq 0 ]; then
              echo "--- orchestrator status (${ITER}x10s) ---"
              ssh $SSH_OPTS root@${{ steps.agent.outputs.ip }} "
                systemctl is-active vigil-setup.service vigil-orchestrator.service 2>&1 || true
                journalctl -u vigil-setup.service -u vigil-orchestrator.service -n 20 --no-pager 2>&1 || true
              " || true
            fi
            sleep 10
          done

      - name: Initialize eval baseline
        env:
          AGENT_IP: ${{ steps.agent.outputs.ip }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          ssh $SSH_OPTS root@$AGENT_IP \
            "set -a; . /etc/vigil/env; set +a; AGENT_HOST=10.0.0.40 bash /root/vigil/eval/scripts/reset-eval-baseline.sh"
          ssh $SSH_OPTS root@$AGENT_IP "systemctl restart vigil-orchestrator.service"
          DEADLINE=$(($(date +%s) + 120))
          until ssh $SSH_OPTS root@$AGENT_IP "curl -sf http://localhost:9099/healthz > /dev/null 2>&1"; do
            [ $(date +%s) -gt $DEADLINE ] && { echo "orchestrator did not recover after baseline reset"; exit 1; }
            sleep 5
          done
          ssh $SSH_OPTS root@$AGENT_IP \
            "set -a; . /etc/vigil/env; set +a; bash /root/vigil/eval/scripts/health-gate.sh /etc/vigil/kubeconfig-eval-runner"

      - name: Run scenarios in group
        env:
          SCENARIOS: ${{ matrix.scenarios }}
          SEED: ${{ github.event.inputs.seed }}
          MODEL: ${{ inputs.model }}
          GROUP: ${{ matrix.group }}
          AGENT_IP: ${{ steps.agent.outputs.ip }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          PREV=""
          for S in $SCENARIOS; do
            if [ -n "$PREV" ]; then
              SHA7=$(ssh $SSH_OPTS root@$AGENT_IP "git -C /root/vigil rev-parse --short=7 HEAD")
              SAFE_MODEL=$(printf '%s' "$MODEL" | tr -c 'a-zA-Z0-9_-' '-')
              PREV_RUN_ID="${PREV}_${SEED}_${SAFE_MODEL}_${SHA7}"
              echo "::group::between-scenarios prev=$PREV next=$S"
              ssh $SSH_OPTS root@$AGENT_IP \
                "set -a; . /etc/vigil/env; set +a; AGENT_HOST=10.0.0.40 PREV_RUN_ID=$PREV_RUN_ID bash /root/vigil/eval/scripts/between-scenarios.sh $PREV $GROUP" \
                || echo "between-scenarios returned non-zero"
              echo "::endgroup::"
            fi
            echo "::group::scenario $S"
            VIGIL_EVAL_STATUS=0
            ssh $SSH_OPTS root@$AGENT_IP \
              "set -a; . /etc/vigil/env; set +a; cd /root/vigil && vigil-eval run --scenario $S --seed $SEED --model $MODEL" \
              || VIGIL_EVAL_STATUS=$?
            echo "::endgroup::"
            if [ "$VIGIL_EVAL_STATUS" -eq 10 ]; then
              echo "Campaign circuit breaker tripped (3 consecutive baseline_degraded) — aborting group $GROUP"
              break
            fi
            if [ "$VIGIL_EVAL_STATUS" -eq 1 ] || [ "$VIGIL_EVAL_STATUS" -eq 2 ]; then
              echo "scenario $S exited $VIGIL_EVAL_STATUS — recorded in runs_index.jsonl"
            elif [ "$VIGIL_EVAL_STATUS" -ne 0 ]; then
              echo "scenario $S exited $VIGIL_EVAL_STATUS — NOT recorded in runs_index.jsonl"
            fi
            PREV=$S
          done

      - name: Rsync run files from agent
        if: always()
        env:
          AGENT_IP: ${{ steps.agent.outputs.ip }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          mkdir -p eval/runs
          ssh $SSH_OPTS root@$AGENT_IP "
            echo '=== systemctl status ==='
            systemctl status vigil-setup.service vigil-orchestrator.service --no-pager -l 2>&1 || true
            echo '=== journal: vigil-setup ==='
            journalctl -u vigil-setup.service --no-pager -n 500 2>&1 || true
            echo '=== journal: vigil-orchestrator ==='
            journalctl -u vigil-orchestrator.service --no-pager -n 500 2>&1 || true
            echo '=== port 9099 ==='
            ss -ltnp | grep 9099 || echo 'not listening'
            echo '=== /etc/vigil ==='
            ls -la /etc/vigil/ 2>&1 || true
            test -f /etc/vigil/env && sed 's/=.*\$/=REDACTED/' /etc/vigil/env || echo '/etc/vigil/env MISSING'
          " > eval/runs/_diagnostics-${{ matrix.group }}.log 2>&1 || true
          rsync -avz -e "ssh $SSH_OPTS" \
            root@$AGENT_IP:/root/vigil/eval/runs/ ./eval/runs/ || true
          if ssh $SSH_OPTS root@$AGENT_IP "test -f /root/vigil/eval/runs_index.jsonl"; then
            rsync -avz -e "ssh $SSH_OPTS" \
              root@$AGENT_IP:/root/vigil/eval/runs_index.jsonl \
              ./eval/runs/runs_index_${{ matrix.group }}.jsonl || true
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: group-runs-${{ matrix.group }}
          path: |
            eval/runs/
          if-no-files-found: warn

      - name: Reset eval-cluster-baseline to main
        if: always()
        env:
          AGENT_IP: ${{ steps.agent.outputs.ip }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          ssh $SSH_OPTS root@$AGENT_IP \
            "set -a; . /etc/vigil/env; set +a; bash /root/vigil/eval/scripts/reset-eval-baseline.sh" \
            || echo "reset-eval-baseline returned non-zero; branch may need manual cleanup"

      - name: Terraform destroy
        if: always() && !inputs.skip_destroy
        working-directory: infra/terraform
        run: terraform destroy -auto-approve -input=false

  aggregate:
    needs: run-scenarios
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Download all group artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: group-runs-*
          merge-multiple: true
          path: eval/runs

      - name: Merge runs indexes
        run: |
          for f in eval/runs/runs_index_*.jsonl; do
            [ -f "$f" ] && cat "$f" >> eval/runs_index.jsonl
          done

      - name: Install dependencies
        run: uv sync --locked --all-packages

      - name: Aggregate
        run: uv run vigil-eval aggregate

      - name: Publish results to step summary
        run: cat eval/results/step_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Publish results to docs/eval-results
        if: ${{ env.LOCAL_RUN != '1' }}
        env:
          RESULTS_BRANCH: docs/eval-results
          RUN_ID: ${{ github.run_id }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin "${RESULTS_BRANCH}" 2>/dev/null || true
          if git rev-parse "origin/${RESULTS_BRANCH}" &>/dev/null; then
            git branch "${RESULTS_BRANCH}" "origin/${RESULTS_BRANCH}"
          else
            git fetch origin main
            git branch "${RESULTS_BRANCH}" origin/main
          fi
          git worktree add /tmp/eval-results "${RESULTS_BRANCH}"
          DEST="/tmp/eval-results/results/${RUN_ID}"
          mkdir -p "${DEST}/traces"
          cp eval/results/REPORT.md eval/results/summary.json "${DEST}/"
          cp eval/runs/*.json "${DEST}/" 2>/dev/null || true
          cp eval/runs/*_trace.jsonl "${DEST}/traces/" 2>/dev/null || true
          cd /tmp/eval-results
          git add "results/${RUN_ID}"
          if git diff --staged --quiet; then
            echo "No new results to record"
          else
            TIMESTAMP=$(TZ=Europe/Berlin date +%Y-%m-%dT%H:%M:%S%z)
            git commit -m "docs(eval): record campaign ${RUN_ID} (${TIMESTAMP})"
            git push origin "${RESULTS_BRANCH}"
          fi
