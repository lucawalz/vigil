name: Build NixOS Snapshots

on:
  push:
    branches: [main]
    paths: ['infra/nixos/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role: [master, worker-1, worker-2, agent]

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17

      - uses: hashicorp/setup-packer@v3
        with:
          version: "~1.11"

      - name: Compute NixOS tree hash
        id: hash
        run: echo "nixos_hash=$(git rev-parse HEAD:infra/nixos)" >> $GITHUB_OUTPUT

      - name: Check for existing snapshot
        id: check
        env:
          HCLOUD_TOKEN: ${{ secrets.TF_VAR_HCLOUD_TOKEN }}
        run: |
          COUNT=$(curl -sf -G \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            --data-urlencode "type=snapshot" \
            --data-urlencode "label_selector=vigil-role=${{ matrix.role }},vigil-nixos-hash=${{ steps.hash.outputs.nixos_hash }}" \
            "https://api.hetzner.cloud/v1/images" \
            | jq '.images | length')
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Generate ephemeral SSH key
        if: steps.check.outputs.exists != 'true'
        run: ssh-keygen -t ed25519 -f /tmp/packer_key -N ""

      - name: Packer init
        if: steps.check.outputs.exists != 'true'
        working-directory: infra/packer
        run: packer init .

      - name: Build snapshot
        id: build
        if: steps.check.outputs.exists != 'true'
        working-directory: infra/packer
        env:
          PKR_VAR_hcloud_token: ${{ secrets.TF_VAR_HCLOUD_TOKEN }}
          PKR_VAR_role: ${{ matrix.role }}
          PKR_VAR_nixos_commit_sha: ${{ github.sha }}
          PKR_VAR_nixos_hash: ${{ steps.hash.outputs.nixos_hash }}
          PKR_VAR_ssh_private_key_file: /tmp/packer_key
        run: packer build .

  cleanup:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Cleanup leaked Packer servers
        env:
          HCLOUD_TOKEN: ${{ secrets.TF_VAR_HCLOUD_TOKEN }}
        run: |
          IDS=$(curl -sf -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?per_page=50" \
            | jq -r '.servers[] | select(.name | startswith("packer-")) | .id')
          for ID in $IDS; do
            echo "Deleting leaked Packer server $ID"
            curl -sf -X DELETE -H "Authorization: Bearer $HCLOUD_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$ID"
          done
