name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-extras --dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  detect-go-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - id: set-modules
        run: echo "modules=$(go list -m -json | jq -s '.' | jq -c '[.[].Dir]')" >> $GITHUB_OUTPUT

  go-lint:
    needs: detect-go-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-go-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - name: golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: ${{ matrix.module }}

  go-test:
    needs: detect-go-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-go-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - name: go test (${{ matrix.module }})
        run: go test ./... -count=1
        working-directory: ${{ matrix.module }}
        env:
          CGO_ENABLED: "0"

  govulncheck:
    needs: detect-go-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-go-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - name: govulncheck (${{ matrix.module }})
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.23"
          go-package: ./...
          work-dir: ${{ matrix.module }}

  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - name: Build all modules
        run: go build github.com/lucawalz/vigil/...
        env:
          CGO_ENABLED: "0"
