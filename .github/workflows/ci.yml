name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --dev --all-packages
      - name: Pytest (agents)
        env:
          LLM_MODEL_NAME: test-model
          OLLAMA_BASE_URL: http://localhost:1/v1
          OLLAMA_API_KEY: sk-test
          VIGIL_WEBHOOK_SECRET: test-secret
        run: uv run pytest tests/agents/ -x --tb=short -q

  lockfile-drift:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Check lockfile is up to date
        run: uv lock --check

  detect-go-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - id: set-modules
        run: |
          echo "modules=$(grep -E '^\s+\./' go.work | tr -d '\t ' | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT

  go-lint:
    needs: detect-go-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-go-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: ${{ matrix.module }}

  go-test:
    needs: detect-go-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-go-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: go test (${{ matrix.module }})
        run: go test ./... -count=1
        working-directory: ${{ matrix.module }}
        env:
          CGO_ENABLED: "0"

  govulncheck:
    needs: detect-go-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-go-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck (${{ matrix.module }})
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26"
          go-package: ./...
          work-dir: ${{ matrix.module }}
        env:
          GOPRIVATE: github.com/lucawalz/*
          GONOSUMDB: github.com/lucawalz/*

  go-build:
    needs: [go-test, go-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Build all modules
        run: go build github.com/lucawalz/vigil/...
        env:
          CGO_ENABLED: "0"

  terraform-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14"
      - name: terraform fmt check
        run: terraform fmt -check -recursive
      - name: terraform init
        run: terraform init -backend=false
      - name: terraform validate
        run: terraform validate
