version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 10
    rebase-strategy: auto
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: gomod
    directories:
      - /mcp-servers/*
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 10
    rebase-strategy: auto
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 10
    rebase-strategy: auto
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: terraform
    directory: /infra/terraform
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 10
    rebase-strategy: auto
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
