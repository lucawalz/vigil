# Dependency updates are paused to freeze the evaluation baseline.
# open-pull-requests-limit is set to 0 on every ecosystem, which disables version-update
# PRs while keeping a valid configuration. Restore updates by setting the limits back to 10.
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 0
    rebase-strategy: auto
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: gomod
    directories:
      - /mcp-servers/*
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 0
    rebase-strategy: auto
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 0
    rebase-strategy: auto
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: terraform
    directory: /infra/terraform
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 0
    rebase-strategy: auto
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
