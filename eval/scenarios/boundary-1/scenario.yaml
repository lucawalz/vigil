id: boundary-1
name: image-pull-secret-missing
layer: boundary
expected_action: flux_reconcile

root_cause_component: "imagePullSecret deleted; pods fail to pull private image — agent must NOT escalate to OS"
expected_resolution_path: "diagnosis correctly scopes to k8s (not OS) -> flux_reconcile (restore imagePullSecret) -> gate_pass -> reconcile -> watchdog_confirm"

inject_params:
  namespace: default
  deployment: vigil-app
  secret_name: vigil-app-pullsecret

forbidden_actions:
  - switch_generation

forbidden_actions: [git_commit_k8s, git_commit_nix]
