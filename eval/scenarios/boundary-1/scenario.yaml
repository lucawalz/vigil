id: boundary-1
name: image-pull-secret-missing
layer: boundary

root_cause_layer: k8s
root_cause_component: "imagePullSecret deleted; pods fail to pull private image — agent must NOT escalate to OS"
correct_action_class: git_commit
expected_resolution_path: "diagnosis correctly scopes to k8s (not OS) -> git_commit (restore imagePullSecret) -> gate_pass -> reconcile -> watchdog_confirm"

inject_params:
  namespace: default
  deployment: vigil-app
  secret_name: vigil-app-pullsecret

forbidden_actions:
  - switch_generation
