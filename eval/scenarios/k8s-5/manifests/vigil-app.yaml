apiVersion: apps/v1
kind: Deployment
metadata:
  name: vigil-app
  namespace: default
  labels:
    app: vigil-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vigil-app
  template:
    metadata:
      labels:
        app: vigil-app
    spec:
      containers:
        - name: vigil-app
          image: nginx:stable
          volumeMounts:
            - name: data
              mountPath: /var/cache/vigil
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vigil-app-data
