apiVersion: apps/v1
kind: Deployment
metadata:
  name: vigil-app
  namespace: default
  labels:
    app: vigil-app
    eval-scenario: boundary-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vigil-app
  template:
    metadata:
      labels:
        app: vigil-app
    spec:
      containers:
        - name: vigil-app
          image: nginx:stable
          volumeMounts:
            - name: config
              mountPath: /etc/vigil-app
      volumes:
        - name: config
          configMap:
            name: vigil-app-config
