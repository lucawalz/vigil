root_cause_component: "Deployment/vigil-app container crashes on APP_CRASH_MODE=1 env var"
expected_resolution_path: "diagnosis -> flux_reconcile (remove crash env) -> gate_pass -> reconcile -> watchdog_confirm"

inject_params:
