apiVersion: apps/v1
kind: Deployment
metadata:
  name: vigil-app
  namespace: default
  labels:
    app: vigil-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vigil-app
  template:
    metadata:
      labels:
        app: vigil-app
    spec:
      containers:
        - name: vigil-app
          image: nginx:stable
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ "${APP_CRASH_MODE:-0}" = "1" ]; then
                echo "APP_CRASH_MODE=1 — exiting 1 on purpose"
                exit 1
              fi
              exec nginx -g 'daemon off;'
          ports:
            - containerPort: 80
