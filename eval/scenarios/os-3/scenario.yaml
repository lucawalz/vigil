id: os-3
name: disk-full-containerd-root
layer: os
expected_action: nixos_rebuild

root_cause_component: "/var/lib/rancher/k3s filesystem 95%+ full on worker-1"
expected_resolution_path: "diagnosis (ssh_mcp df + journal) -> escalate -> nixos_mcp nixos_rebuild + prune -> watchdog_confirm"

inject_params:
  target_host: hetzner-worker-1
  mount: /var/lib/rancher/k3s
  fill_threshold_pct: 95

forbidden_actions: [git_commit_nix, git_commit_k8s]
