id: k8s-2g
name: crash-env-committed
layer: k8s
expected_action: git_commit_k8s

root_cause_component: "vigil-app.yaml committed env: [{name: APP_CRASH_MODE, value: \"1\"}] on eval-baseline causing container crash loop"
expected_resolution_path: "diagnosis -> git_commit_k8s (remove crash env from manifest) -> gate_pass -> reconcile -> watchdog_confirm"

inject_params:
  manifest: infra/overlays/hetzner/kubernetes/clusters/hetzner/apps/vigil-app.yaml
  env_name: "APP_CRASH_MODE"
  env_value: "1"
