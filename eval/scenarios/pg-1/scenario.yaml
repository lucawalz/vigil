expected_resolution_path: "diagnosis -> flux_reconcile (restore image; StatefulSet support pending in lookup_manifest_path) -> gate_pass -> reconcile -> watchdog_confirm"

inject_params:
  namespace: default
  statefulset: postgresql
  bad_image: "bitnami/postgresql:bogus-tag-v0"
  good_image: "docker.io/bitnami/postgresql:16"

alert_name: PostgresDown
forbidden_actions: [git_commit_k8s, git_commit_nix]
