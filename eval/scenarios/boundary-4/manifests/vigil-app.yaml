apiVersion: apps/v1
kind: Deployment
metadata:
  name: vigil-app
  namespace: default
  labels:
    app: vigil-app
    eval-scenario: boundary-4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vigil-app
  template:
    metadata:
      labels:
        app: vigil-app
    spec:
      containers:
        - name: vigil-app
          image: nginx:stable
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "128Mi"
          readinessProbe:
            tcpSocket:
              host: kubernetes.default.svc.cluster.local
              port: 443
            initialDelaySeconds: 5
            periodSeconds: 5
