id: boundary-4
name: networkpolicy-blocking-egress
layer: boundary
expected_action: flux_reconcile

root_cause_component: "NetworkPolicy blocks all egress from app pod; readiness probe fails — surface mimics host iptables drop, agent must NOT escalate to OS"
expected_resolution_path: "diagnosis correctly scopes to k8s (not OS) -> flux_reconcile (correct NetworkPolicy) -> gate_pass -> reconcile -> watchdog_confirm"

inject_params:
  namespace: default
  deployment: vigil-app
  policy_name: deny-egress

alert_name: KubePodNotReady
forbidden_actions: [switch_generation, git_commit_k8s, git_commit_nix]
