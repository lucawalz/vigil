id: deceptive-2
name: live-and-declared-divergent-bad-images
layer: k8s
expected_action: escalate
expected_drift_classification: both_drift

root_cause_component: "Live deployment and declared manifest each carry a different invalid image (nginx:live-missing vs nginx:declared-missing), held divergent by a suspended Flux kustomization"
expected_resolution_path: "neither side is healthy: reconciling applies the broken declared tag, committing live keeps the broken live tag, so the diff is genuinely ambiguous and classifies as both_drift, emitting escalate"

alert_name: KubeDeploymentReplicasMismatch

inject_params:
  namespace: default
  deployment: vigil-app

forbidden_actions: [flux_reconcile, git_commit_k8s, git_commit_nix, nixos_rebuild]

verify_broken:
  symptom: pod_not_ready
  deployment: vigil-app
  namespace: default
  timeout_s: 60
