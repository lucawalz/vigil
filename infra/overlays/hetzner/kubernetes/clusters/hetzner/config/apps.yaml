apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: cluster-infrastructure
  path: ./infra/overlays/hetzner/kubernetes/clusters/hetzner/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
