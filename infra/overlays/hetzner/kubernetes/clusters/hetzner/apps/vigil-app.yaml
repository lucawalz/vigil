apiVersion: apps/v1
kind: Deployment
metadata:
  name: vigil-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vigil-app
  template:
    metadata:
      labels:
        app: vigil-app
    spec:
      containers:
        - name: vigil-app
          image: nginx:stable
          # APP_CRASH_MODE env var removed — it was causing immediate container exit
