apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: vigil-app\n  namespace: default\n  labels:\n    app: vigil-app\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n      app: vigil-app\n  template:\n    metadata:\n      labels:\n        app: vigil-app\n    spec:\n      containers:\n        - name: vigil-app\n          image: nginx:latest\n          env:\n            - name: REQUIRED_API_BASE\n              value: \"http://127.0.0.1\"\n          resources:\n            requests:\n              memory: \"64Mi\"\n            limits:\n              memory: \"128Mi\"\n          volumeMounts:\n            - name: nginx-config-template\n              mountPath: /etc/nginx/templates\n              readOnly: true\n      volumes:\n        - name: nginx-config-template\n          configMap:\n            name: vigil-app-nginx-config