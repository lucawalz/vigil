apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: redis
      version: "25.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 24h
  values:
    architecture: standalone
    auth:
      enabled: false
    master:
      nodeSelector:
        node.kubernetes.io/role: worker
      persistence:
        storageClass: longhorn
        size: 1Gi
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 256Mi
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
