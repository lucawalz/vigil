apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: local-path-provisioner
      version: "0.0.31"
      sourceRef:
        kind: HelmRepository
        name: rancher
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
