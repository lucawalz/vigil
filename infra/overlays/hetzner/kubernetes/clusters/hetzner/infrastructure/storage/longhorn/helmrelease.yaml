apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: "1.11.x"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 24h
  values:
    defaultSettings:
      defaultReplicaCount: 2
    longhornManager:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
    longhornDriver:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
